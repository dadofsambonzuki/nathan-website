{{- $nevent := .Get "nevent" -}}
{{- $naddr := .Get "naddr" -}}
{{- $identifier := "" -}}

{{- if $nevent -}}
  {{- $identifier = $nevent -}}
{{- else if $naddr -}}
  {{- $identifier = $naddr -}}
{{- end -}}

{{- if $identifier -}}
<a href="https://jumble.social/{{ $identifier }}" target="_blank" rel="noopener">
  <i class="fa-solid fa-arrow-up-right-from-square" aria-hidden="true"></i> View on Nostr
</a>
{{- end -}}
